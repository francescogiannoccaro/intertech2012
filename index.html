
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=./index-en.html">
  <title>Intertech Consulting</title>
  <script src="js/language.js"></script>
</head>
<body>
  <script>
    // Check for language preference; redirect to Italian if previously chosen
    var preference = LanguagePreference.get();
    if (preference === 'it') {
      window.location.replace('index-it.html');
    } else {
      // Set English as preference and redirect to English page
      LanguagePreference.set('en');
      window.location.replace('index-en.html');
    }
  </script>
  
  <!-- Fallback link for JS-disabled browsers -->
  <p>If you are not redirected automatically, <a href="index-en.html">click here</a>.</p>
</body>
</html>
